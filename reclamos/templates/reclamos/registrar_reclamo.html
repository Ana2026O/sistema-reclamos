
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar Reclamo</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f2f2f2;
}

/* ===== MENU SUPERIOR ===== */

.header{
    background:#1f4f82;
    color:white;
    height:70px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 40px;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.subtitulo{
    font-size:20px;
    font-weight:normal;
}

.menu{
    display:flex;
    gap:40px;
    font-size:18px;
}

/* ===== BANNER ===== */

.banner{
    height:220px;

    background:
    linear-gradient(
        rgba(20,70,120,0.75),
        rgba(20,70,120,0.75)
    ),
    url("/static/reclamos/img/banner.jpg");

    background-size:cover;
    background-position:center;

    color:white;

    display:flex;
    align-items:center;
}

.banner-texto{
    margin-left:80px;
}

.banner-texto h3{
    font-size:20px;
    margin-bottom:15px;
    font-weight:normal;
}

.banner-texto h1{
    font-size:28px;
    margin-bottom:15px;
}

.banner-texto p{
    font-size:18px;
}

/* ===== TITULO FORMULARIO ===== */


   .titulo-form{
    background:#d9d9d9;
    padding:8px 50px;
    font-size:18px;
    margin-bottom:10px;
   }

/* ===== FORMULARIO ===== */

.formulario{
    width:95%;
    max-width:1400px;
    margin:10px auto;
}

.fila{
    display:flex;
    gap:40px;
    margin-bottom:20px;
}
.campo{
    flex:1;
}

.campo label{
    display:block;
    margin-bottom:5px;
    font-size:18px;
}

.campo input,


select {
    width: 100%;
    padding: 8px;
    border: 1px solid #b5b5b5;
    border-radius: 6px;
    background: white;
    font-size: 16px;
}




.campo textarea{

    width:100%;
    padding:8px;

    border:1px solid #b5b5b5;

    background:white;

    border-radius:6px;

    font-size:16px;
}
input[type="text"],
input[type="email"]{
    width:100%;
    padding:8px;
    border:1px solid #b5b5b5;
    border-radius:6px;
    background:white;
    font-size:16px;
}

.campo{
    flex:1;
}

.campo label{
    display:block;
    margin-bottom:18px;
    font-size:13px;
    font-weight:bold;
}

textarea{
    height:60px;
    resize:none;
}

/* ===== BOTON ===== */

.boton-area {
    position: fixed;
    bottom: 1px;   /* distancia desde abajo */
    right: 70px;    /* alineado a la derecha */

}


.boton{
    background:#f4a300;
    color:white;

    border:none;

    padding:10px 10px;

    font-size:14px;

    font-weight:bold;

    cursor:pointer;
}
.fila-datos{
    margin-top:12px;
}
.fila-descripcion{
    margin-top:8px;
}
.descripcion-campo{
    width:75%;
}

.boton i {
    margin-right: 8px;   /* espacio entre el ícono y el texto */
    font-size: 1.2em;    /* tamaño del ícono relativo al texto */
    vertical-align: middle; /* lo centra verticalmente */
}






</style>
</head>


  

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    


    


<body>

<header class="header">



    <div>
       <h1 class="logo">
    <i class="fa-solid fa-file-alt"></i> Reclamos
</h1>
<p class="subtitulo">Sistema de atención al cliente</p>

    </div>




    
<nav class="menu">
    <span><i class="fa-solid fa-comments"></i> Mis Consultas</span>
    <span><i class="fa-solid fa-gear"></i> Gestión</span>
</nav>
        

    

</header>

<section class="banner">

    <div class="banner-texto">

        <h3>ATENCIÓN AL CLIENTE</h3>

        <h1>
            ¿Tuviste un inconveniente?<br>
            Registra tu reclamo aquí
        </h1>

        <p>
            Nuestro equipo revisará tu caso a la brevedad.
        </p>

    </div>

</section>

<div class="titulo-form">
    Ingrese su reclamo aquí
</div>

<form method="post" class="formulario">

    {% csrf_token %}

<div class="fila">

    <div class="campo">
        <label>Nombre y Apellido</label>
        <input type="text" name="nombre">
    </div>

    <div class="campo">
        <label>Correo Electrónico</label>
        <input type="email" name="correo">
    </div>

</div>

<div class="fila fila-datos">

    <div class="campo">
        <label>Teléfono</label>
        <input type="text" name="telefono">
    </div>



  <div class="campo">
    <label>Categoría</label>
    <select name="categoria">
        <option value="facturacion">Facturación</option>
        <option value="atencion">Atención al cliente</option>
        <option value="servicio">Servicio técnico</option>
    </select>
</div>





</div>

<div class="fila fila-descripcion">

    <div class="campo descripcion-campo">
    <label>Descripción del Reclamo</label>
    {{ form.descripcion }}
    </div>
    

    <!-- BOTÓN DE ENVÍO -->
    
    <div class="boton-area">
    <button type="submit" class="boton">
        <i class="fa-solid fa-paper-plane"></i> Enviar Reclamo
    </button>
</div>




</div>


</form>

</body>
</html>
