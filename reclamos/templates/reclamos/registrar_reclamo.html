{% extends 'reclamos/base.html' %}
{% load static %}

{% block title %}Registrar Reclamo{% endblock %}

{% block content %}
<section class="contenedor-celeste">
  <h2>Registrar Reclamo</h2>
  <p>Complete el formulario para enviar su reclamo</p>

  <form method="post">
    {% csrf_token %}

    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" required>

    <label for="apellido">Apellido:</label>
    <input type="text" id="apellido" name="apellido" required>

    <label for="dni">DNI:</label>
    <input type="text" id="dni" name="dni" required>

    <label for="email">Correo electrónico:</label>
    <input type="email" id="email" name="email" required>

    <label for="telefono">Teléfono:</label>
    <input type="tel" id="telefono" name="telefono">

    <label for="direccion">Dirección:</label>
    <input type="text" id="direccion" name="direccion">

    <label for="descripcion">Descripción del reclamo:</label>
    <textarea id="descripcion" name="descripcion" rows="4" required></textarea>

    <button type="submit">Enviar Reclamo</button>
  </form>
</section>
{% endblock %}
