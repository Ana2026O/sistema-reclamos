<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Categorías</title>
    {% load static %}
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 480px; /* pantalla chica */
            margin: auto;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }
        h2, h3 {
            text-align: center;
            color: #333;
        }
        form {
            margin-bottom: 15px;
        }
        input[type="text"] {
            width: 70%;
            padding: 6px;
            margin-right: 5px;
        }
        button, .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }
        .btn-primary { background-color: #4CAF50; color: white; }
        .btn-warning { background-color: #ff9800; color: white; }
        .btn-danger { background-color: #f44336; color: white; }
        .btn-volver { background-color: #2196F3; color: white; display:block; margin-top:10px; text-align:center; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 6px;
            text-align: center;
        }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
<div class="container">
    <h2>Gestión de Categorías</h2>

    <!-- Formulario para crear nueva categoría -->
<form method="post" action="{% url 'categorias' %}">
    {% csrf_token %}
    <input type="text" name="nombre" placeholder="Nueva categoría" required>
    <button type="submit" class="btn btn-primary">Guardar</button>
</form>

    <hr>

    <!-- Listado de categorías -->
    <h3>Listado de Categorías</h3>
    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for categoria in categorias %}
            <tr>
                <td>{{ categoria.nombre }}</td>
                <td>
                    <a href="{% url 'editar_categoria' categoria.id %}" class="btn btn-warning">Editar</a>
                    <a href="{% url 'eliminar_categoria' categoria.id %}" class="btn btn-danger">Eliminar</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2">No hay categorías registradas.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <!-- Botón para volver a detalle -->
   <a href="{% url 'panel_control' %}" class="btn btn-volver">Volver al Panel</a>

</div>
</body>
</html>
