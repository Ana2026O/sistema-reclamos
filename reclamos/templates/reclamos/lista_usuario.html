<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lista de Usuarios</title>

<style>
body{
    background:#e8e8e8;
    font-family:Arial, sans-serif;
}
.contenido{
    margin:40px;
}
.titulo{
    width:390px;
    background:white;
    padding:18px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    margin:0 auto 30px auto;
}
table{
    width:100%;
    border-collapse:collapse;
    background:white;
}
th, td{
    border:1px solid #000;
    padding:10px;
    text-align:center;
}
th{
    background:#214b78;
    color:white;
}
.acciones a{
    margin:0 5px;
    text-decoration:none;
    font-weight:bold;
}
.editar{ color:#e8be63; }
.eliminar{ color:#e9a8a8; }
.alta{ color:#2d7a2d; }
</style>
</head>
<body>

<div class="contenido">
    <div class="titulo">Usuarios registrados</div>

    <table>
        <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Email</th>
            <th>Acciones</th>
        </tr>
        {% for usuario in usuarios %}
        <tr>
            <td>{{ usuario.id }}</td>
            <td>{{ usuario.username }}</td>
            <td>{{ usuario.first_name }}</td>
            <td>{{ usuario.last_name }}</td>
            <td>{{ usuario.email }}</td>
            <td class="acciones">
                <a href="{% url 'alta_usuario' usuario.id %}" class="editar">✏️ Editar</a>
                <a href="{% url 'eliminar_usuario' usuario.id %}" class="eliminar">🗑 Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <div style="margin-top:20px; text-align:center;">
        <a href="{% url 'alta_usuario' %}" class="alta">➕ Alta nuevo usuario</a>
    </div>
</div>

</body>
</html>
