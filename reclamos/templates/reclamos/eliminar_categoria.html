<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Categoría</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 20px;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 {
            color: #333;
        }
        p {
            margin: 15px 0;
            color: #555;
        }
        button, .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            margin: 5px;
        }
        .btn-danger { background-color: #f44336; color: white; }
        .btn-volver { background-color: #2196F3; color: white; }
    </style>
</head>
<body>
<div class="container">
    <h2>Eliminar Categoría</h2>

    <p>¿Seguro que quieres eliminar la categoría <strong>{{ categoria.nombre }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-danger">Sí, eliminar</button>
        <a href="{% url 'categorias' %}" class="btn btn-volver">Cancelar</a>
    </form>
</div>
</body>
</html>
