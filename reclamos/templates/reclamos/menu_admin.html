<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú Administrativo</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#1f4f82;
    height:100vh;
}

/* PANEL IZQUIERDO */

.lateral{

    position:absolute;

    left:0;
    top:0;

    width:350px;
    height:100%;

    color:white;

    display:flex;
    flex-direction:column;
    align-items:center;
}

.icono{

    font-size:80px;

    margin-top:70px;
}

.sistema{

    text-align:center;

    font-size:18px;

    font-weight:bold;

    margin-top:10px;
}

.bienvenida{

    text-align:center;

    margin-top:50px;

    font-size:24px;

    font-weight:bold;

    line-height:1.3;
}

/* PANEL CENTRAL */

.menu{

    margin-left:350px;

    height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    gap:90px;
}

.boton{

    width:380px;

    height:60px;

    border:none;

    border-radius:20px;

    background:#e4e4e4;

    font-size:22px;

    cursor:pointer;
}

.salir{

    position:absolute;

    right:250px;

    bottom:120px;

    width:140px;

    height:40px;

    border:none;

    border-radius:20px;

    background:#f7941d;

    color:white;

    font-size:20px;

    cursor:pointer;
}

</style>

</head>

<body>

<div class="lateral">

    <div class="icono">⌂</div>

    <div class="sistema">
        Sistema de<br>
        reclamo
    </div>

    <div class="bienvenida">
        Bienvenido<br>
        Sector de gestión y atención<br>
        de reclamos
    </div>

</div>

<div class="menu">

    <button class="boton">
        Alta usuarios
    </button>

    <button class="boton">
        Gestión de reclamos
    </button>

    <button class="boton">
        Reportes y estadísticas
    </button>

</div>

<button class="salir">
    Salir
</button>

</body>
</html>
