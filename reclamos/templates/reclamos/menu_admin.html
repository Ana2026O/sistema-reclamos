<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú Administrativo</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#1f4f82;
    height:100vh;
}

/* PANEL IZQUIERDO */

.lateral{

    position:absolute;

    left:0;
    top:0;

    width:350px;
    height:100%;

    color:white;

    display:flex;
    flex-direction:column;
    align-items:center;
}

.icono{

    font-size:80px;

    margin-top:70px;
}

.sistema{

    text-align:center;

    font-size:18px;

    font-weight:bold;

    margin-top:10px;
}

.bienvenida{

    text-align:center;

    margin-top:50px;

    font-size:24px;

    font-weight:bold;

    line-height:1.3;
}

/* PANEL CENTRAL */

.menu{
    margin-left:600px;   /* mantiene espacio para el panel lateral */
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:flex-start; /* alinea los botones al inicio en vez de al centro */
    gap:40px;              /* menos separación para que no queden tan lejos */
    padding-left:60px;     /* agrega un poco de espacio desde el lateral */
}

.boton{
    width:300px;   /* más angosto para que no se vean tan grandes */
    height:55px;
    border:none;
    border-radius:100px;
    background:#e4e4e4;
    font-size:20px;
    cursor:pointer;
}




.salir{

    position:absolute;

    right:100px;

    bottom: 10px;

    width:140px;

    height:40px;

    border:none;

    border-radius:100px;

    background:#f7941d;

    color:white;

    font-size:20px;

    cursor:pointer;
    
    
    
}

</style>

</head>

<body>

<div class="lateral">

    <div class="icono">⌂</div>

    <div class="sistema">
        Sistema de<br>
        reclamo
    </div>

    <div class="bienvenida">
        Bienvenido<br>
        Sector de gestión y atención<br>
        de reclamos
    </div>

</div>

<div class="menu">

    <!-- Cartel de permisos -->
    {% if messages %}
      <div class="alert" style="background:#ffdddd; border:1px solid red; padding:15px; border-radius:8px; width:500px; text-align:center; font-weight:bold; color:red;">
        {% for message in messages %}
          {{ message }}
        {% endfor %}
      </div>
    {% endif %}

    <button class="boton" onclick="window.location.href='{% url 'alta_usuario' %}'">
        Administrador de usuarios
    </button>

    <button class="boton" onclick="window.location.href='{% url 'panel_control' %}'">
        Gestión ABM de reclamos
    </button>

    <button class="boton" onclick="window.location.href='{% url 'reportes' %}'">
        Reportes y estadísticas
    </button>

</div>



<button class="salir" onclick="window.location.href='{% url 'inicio' %}'">
    SALIR
</button>



    

</div>



</body>
</html>
